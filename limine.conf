# Limine v11 config. Boot straight into oxbow; no menu.
timeout: 0

/oxbow
    protocol: limine
    path: boot():/boot/oxbow
    # User-mode servers, delivered as modules. The kernel makes one process per
    # module, each in its own address space.
    module_path: boot():/boot/server.elf
    module_cmdline: pong
    module_path: boot():/boot/beta.elf
    module_cmdline: beta
    module_path: boot():/boot/hello.elf
    module_cmdline: hello
    module_path: boot():/boot/badge.elf
    module_cmdline: badge
    module_path: boot():/boot/cat.elf
    module_cmdline: cat
    module_path: boot():/boot/ls.elf
    module_cmdline: ls
    module_path: boot():/boot/mkdir.elf
    module_cmdline: mkdir
    module_path: boot():/boot/touch.elf
    module_cmdline: touch
    module_path: boot():/boot/rm.elf
    module_cmdline: rm
    module_path: boot():/boot/mv.elf
    module_cmdline: mv
    module_path: boot():/boot/cp.elf
    module_cmdline: cp
    module_path: boot():/boot/drift.elf
    module_cmdline: drift
    module_path: boot():/boot/cc-hello.elf
    module_cmdline: cc-hello
    module_path: boot():/boot/tcc.elf
    module_cmdline: tcc
    module_path: boot():/boot/lua.elf
    module_cmdline: lua
    module_path: boot():/boot/kbd.elf
    module_cmdline: kbd
    module_path: boot():/boot/tty.elf
    module_cmdline: tty
    module_path: boot():/boot/shell.elf
    module_cmdline: shell
    module_path: boot():/boot/serial.elf
    module_cmdline: serial
    module_path: boot():/boot/initrd.tar
    module_cmdline: initrd
    module_path: boot():/boot/fs.elf
    module_cmdline: fs
    module_path: boot():/boot/net.elf
    module_cmdline: net
